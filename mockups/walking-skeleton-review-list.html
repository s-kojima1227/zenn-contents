<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>レビュー一覧（ウォーキングスケルトン）</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .browser-bar {
      background: #dee1e6;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .browser-dots {
      display: flex;
      gap: 6px;
    }

    .browser-dots span {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #ff5f57;
    }

    .browser-dots span:nth-child(2) {
      background: #ffbd2e;
    }

    .browser-dots span:nth-child(3) {
      background: #28c840;
    }

    .browser-address {
      flex: 1;
      background: white;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 13px;
      color: #555;
    }

    .page {
      flex: 1;
      background: white;
      padding: 40px;
    }

    .page-title {
      font-size: 16px;
      color: #333;
      margin-bottom: 4px;
    }

    .product-id {
      font-size: 13px;
      color: #888;
      margin-bottom: 24px;
    }

    .review-list {
      list-style: none;
      max-width: 480px;
    }

    .review-item {
      padding: 12px 0;
      border-bottom: 1px solid #eee;
    }

    .review-meta {
      font-size: 12px;
      color: #999;
      margin-bottom: 4px;
      font-family: monospace;
    }

    .review-comment {
      font-size: 14px;
      color: #333;
    }

    .new-review-link {
      display: inline-block;
      margin-top: 20px;
      font-size: 13px;
      color: #0969da;
      text-decoration: underline;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="browser-bar">
    <div class="browser-dots">
      <span></span><span></span><span></span>
    </div>
    <div class="browser-address">localhost:3000/products/prod_abc123/reviews</div>
  </div>
  <div class="page">
    <p class="page-title">レビュー一覧</p>
    <p class="product-id">商品ID: prod_abc123</p>
    <ul class="review-list">
      <li class="review-item">
        <p class="review-meta">review_001 / user_a1b2c3 / 2026-03-05</p>
        <p class="review-comment">使いやすくて良かったです</p>
      </li>
      <li class="review-item">
        <p class="review-meta">review_002 / user_d4e5f6 / 2026-03-06</p>
        <p class="review-comment">デザインが気に入りました</p>
      </li>
    </ul>
    <span class="new-review-link">レビューを投稿する</span>
  </div>
</body>
</html>
