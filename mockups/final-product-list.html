<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商品一覧（本実装後）</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .browser-bar {
      background: #dee1e6;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .browser-dots {
      display: flex;
      gap: 6px;
    }

    .browser-dots span {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #ff5f57;
    }

    .browser-dots span:nth-child(2) {
      background: #ffbd2e;
    }

    .browser-dots span:nth-child(3) {
      background: #28c840;
    }

    .browser-address {
      flex: 1;
      background: white;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 13px;
      color: #555;
    }

    .page {
      flex: 1;
      background: white;
      padding: 32px 40px;
    }

    .page-title {
      font-size: 20px;
      font-weight: bold;
      color: #333;
      margin-bottom: 24px;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      max-width: 640px;
    }

    .product-card {
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: box-shadow 0.2s;
    }

    .product-card:hover {
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .product-image {
      width: 100%;
      height: 140px;
      background: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #bbb;
      font-size: 32px;
    }

    .product-card:nth-child(1) .product-image { background: #e8f4e8; }
    .product-card:nth-child(2) .product-image { background: #e8e8f4; }
    .product-card:nth-child(3) .product-image { background: #f4e8e8; }

    .product-info {
      padding: 12px;
    }

    .product-name {
      font-size: 13px;
      color: #333;
      margin-bottom: 4px;
      font-weight: 500;
    }

    .product-price {
      font-size: 15px;
      font-weight: bold;
      color: #e44;
      margin-bottom: 6px;
    }

    .product-rating {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: #888;
    }

    .stars {
      color: #f5a623;
      font-size: 13px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="browser-bar">
    <div class="browser-dots">
      <span></span><span></span><span></span>
    </div>
    <div class="browser-address">localhost:3000/products</div>
  </div>
  <div class="page">
    <p class="page-title">商品一覧</p>
    <div class="product-grid">
      <div class="product-card">
        <div class="product-image">&#x1f331;</div>
        <div class="product-info">
          <p class="product-name">ハンドメイド観葉植物ポット</p>
          <p class="product-price">&yen;2,480</p>
          <div class="product-rating">
            <span class="stars">&#9733;&#9733;&#9733;&#9733;&#9734;</span>
            <span>(12)</span>
          </div>
        </div>
      </div>
      <div class="product-card">
        <div class="product-image">&#x1f9f6;</div>
        <div class="product-info">
          <p class="product-name">手編みコースター 4枚セット</p>
          <p class="product-price">&yen;1,200</p>
          <div class="product-rating">
            <span class="stars">&#9733;&#9733;&#9733;&#9733;&#9733;</span>
            <span>(8)</span>
          </div>
        </div>
      </div>
      <div class="product-card">
        <div class="product-image">&#x1f56f;</div>
        <div class="product-info">
          <p class="product-name">アロマキャンドル ラベンダー</p>
          <p class="product-price">&yen;1,800</p>
          <div class="product-rating">
            <span class="stars">&#9733;&#9733;&#9733;&#9734;&#9734;</span>
            <span>(5)</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
