<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商品一覧（ウォーキングスケルトン）</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .browser-bar {
      background: #dee1e6;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .browser-dots {
      display: flex;
      gap: 6px;
    }

    .browser-dots span {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #ff5f57;
    }

    .browser-dots span:nth-child(2) {
      background: #ffbd2e;
    }

    .browser-dots span:nth-child(3) {
      background: #28c840;
    }

    .browser-address {
      flex: 1;
      background: white;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 13px;
      color: #555;
    }

    .page {
      flex: 1;
      background: white;
      padding: 40px;
    }

    .page-title {
      font-size: 16px;
      color: #333;
      margin-bottom: 24px;
    }

    .product-list {
      list-style: none;
    }

    .product-item {
      padding: 12px 0;
      border-bottom: 1px solid #eee;
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 480px;
    }

    .product-id {
      font-size: 14px;
      color: #555;
      font-family: monospace;
    }

    .product-link {
      font-size: 13px;
      color: #0969da;
      text-decoration: underline;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="browser-bar">
    <div class="browser-dots">
      <span></span><span></span><span></span>
    </div>
    <div class="browser-address">localhost:3000/products</div>
  </div>
  <div class="page">
    <p class="page-title">商品一覧</p>
    <ul class="product-list">
      <li class="product-item">
        <span class="product-id">prod_abc123</span>
        <span class="product-link">レビュー一覧</span>
      </li>
      <li class="product-item">
        <span class="product-id">prod_def456</span>
        <span class="product-link">レビュー一覧</span>
      </li>
      <li class="product-item">
        <span class="product-id">prod_ghi789</span>
        <span class="product-link">レビュー一覧</span>
      </li>
    </ul>
  </div>
</body>
</html>
